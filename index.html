<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gudi Padwa Greeting Generator</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #greeting { font-size: 24px; margin-bottom: 20px; }
        #counter { font-size: 18px; color: gray; }
    </style>
</head>
<body>
    <h1>Gudi Padwa Greeting Generator</h1>
    <div id="greeting"></div>
    <button id="generate">Generate Greeting</button>
    <div id="counter">Visiter Count: <span id="visitorCount">0</span></div>

    <script>
        const greetings = [
            "Happy Gudi Padwa! May this year bring you joy and prosperity!",
            "May Gudi Padwa fill your life with happiness and success!",
            "Wishing you a prosperous Gudi Padwa! Enjoy the celebrations!",
            "Happy Gudi Padwa! May you achieve all your dreams this year!"
        ];

        const greetingDiv = document.getElementById('greeting');
        const visitorCountDisplay = document.getElementById('visitorCount');

        // Load visitor count from localStorage
        let visitorCount = localStorage.getItem('visitorCount') ? parseInt(localStorage.getItem('visitorCount')) : 0;
        visitorCountDisplay.textContent = visitorCount;

        function generateGreeting() {
            const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
            greetingDiv.textContent = randomGreeting;

            // Increment the visitor count
            visitorCount++;
            localStorage.setItem('visitorCount', visitorCount);
            visitorCountDisplay.textContent = visitorCount;
        }

        document.getElementById('generate').addEventListener('click', generateGreeting);
    </script>
</body>
</html>
