<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Marathi Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari&display=swap" rel="stylesheet">

<title>गुढीपाडवा शुभेच्छा</title>

<style>
body {
    font-family: 'Noto Sans Devanagari', Arial, sans-serif;
    text-align: center;
    margin: 0;
    background: linear-gradient(to bottom, #fff5e6, #ffe0b2);
}

h2 {
    color: #b03a2e;
}

input, button, label {
    font-family: inherit;
    font-size: 1em;
}
input {
    padding: 10px;
    margin: 6px;
    width: 85%;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 15px;
    margin: 8px 3px;
    background: #d35400;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #b03a2e;
}

#card {
    width: 320px;
    margin: auto;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    position: relative;
    background: #fff;
    margin-bottom: 20px;
}

/* Greeting Card Background (gudi.png) */
#card::before {
    content: "";
    background-image: url("gudi.png");
    background-size: cover;
    background-position: center;
    opacity: 0.13;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 15px;
    z-index: 0;
}

.logo {
    width: 70px;
    position: relative;
    z-index: 1;
    margin-top: 5px;
}

.banner {
    background: linear-gradient(to right, orange, #ff9800);
    color: white;
    padding: 8px;
    border-radius: 5px;
    margin: 5px 0;
    position: relative;
    z-index: 1;
    font-weight: bold;
}

#userPhoto {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid orange;
    margin-top: 5px;
    object-fit: cover;
    background: #eee;
    position: relative;
    z-index: 1;
}

#card p, #card h3 {
    position: relative;
    z-index: 1;
    margin: 5px 0;
}

#counter {
    font-size: 0.95em;
    margin: 20px 0 10px 0;
    color: #a0522d;
    padding: 8px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>🌸 गुढीपाडवा शुभेच्छा 🌸</h2>

<div style="background: #fff9f0; padding: 10px; border-radius: 8px; margin: 10px 20px;">
    <input type="text" id="name" placeholder="नाव"><br>
    <input type="text" id="role" placeholder="पद (उदा. विद्यार्थी, श��क्षक)"><br>
    <input type="text" id="school" placeholder="शाळा"><br>
    <label for="photo" style="font-size:0.98em; color: #555;">आपला फोटो:</label>
    <input type="file" id="photo" accept="image/*"><br>
    <button type="button" onclick="generate()">पूर्वावलोकन (Preview)</button>
</div>

<hr style="width: 75%;">

<div id="card">
    <!-- Logo -->
    <img src="logo.png" class="logo" alt="logo"><br>

    <h3>जिल्हा परिषद पालघर</h3>

    <div class="banner">गुढीपाडवा पट वाढवा</div>

    <h3>मी जि. प. शाळेचा विद्यार्थी</h3>

    <img id="userPhoto" alt="आपला फोटो"><br>

    <p id="previewName"></p>
    <p id="previewRole"></p>
    <p id="previewSchool"></p>
</div>

<div style="margin-bottom:10px;">
    <button onclick="downloadImage()">शुभेच्छापत्र डाउनलोड करा</button>
    <button onclick="shareLink()">WhatsApp वर शेअर करा</button>
    <button onclick="copyLink()">लिंक कॉपी करा</button>
</div>

<div id="counter">⏳ लोकांची संख्या मोजली जात आहे...</div>

<!-- html2canvas for download -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
function generate() {
    let name = document.getElementById("name").value.trim();
    let role = document.getElementById("role").value.trim();
    let school = document.getElementById("school").value.trim();

    document.getElementById("previewName").innerText = name ? 'नाव: ' + name : '';
    document.getElementById("previewRole").innerText = role ? 'पद: ' + role : '';
    document.getElementById("previewSchool").innerText = school ? 'शाळा: ' + school : '';

    let file = document.getElementById("photo").files[0];
    if(file){
        let reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("userPhoto").src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    // Update URL for sharing
    let url = window.location.origin + window.location.pathname +
        "?name=" + encodeURIComponent(name) +
        "&role=" + encodeURIComponent(role) +
        "&school=" + encodeURIComponent(school);

    window.history.replaceState({}, "", url);
}

function downloadImage() {
    html2canvas(document.getElementById("card")).then(canvas => {
        let link = document.createElement("a");
        link.download = "gudi-padwa-greeting.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}

function shareLink() {
    let name = document.getElementById("name").value.trim();
    let role = document.getElementById("role").value.trim();
    let school = document.getElementById("school").value.trim();
    let url = window.location.origin + window.location.pathname +
        "?name=" + encodeURIComponent(name) +
        "&role=" + encodeURIComponent(role) +
        "&school=" + encodeURIComponent(school);

    let text = "🌸 माझ्या गुढीपाडवा शुभेच्छा पाहा 👇\n" + url;
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

function copyLink() {
    let name = document.getElementById("name").value.trim();
    let role = document.getElementById("role").value.trim();
    let school = document.getElementById("school").value.trim();
    let url = window.location.origin + window.location.pathname +
        "?name=" + encodeURIComponent(name) +
        "&role=" + encodeURIComponent(role) +
        "&school=" + encodeURIComponent(school);
    navigator.clipboard.writeText(url);
    alert("लिंक कॉपी झाली आहे!");
}

// Load from URL params on page load
window.onload = function() {
    let params = new URLSearchParams(window.location.search);
    if(params.get("name") || params.get("role") || params.get("school")) {
        document.getElementById("name").value = params.get("name") || "";
        document.getElementById("role").value = params.get("role") || "";
        document.getElementById("school").value = params.get("school") || "";
        generate();
    }
    
    // Visitor Counter API
    fetch('https://api.countapi.xyz/update/alisha007pro/gudi-padwa?amount=1')
    .then(res => res.json())
    .then(data => {
        document.getElementById("counter").innerHTML = "🌟 आतापर्यंत भेट दिली आहे: <b>" + data.value + "</b> लोकांनी!";
    })
    .catch(()=>document.getElementById("counter").innerText="👤 भेटीची संख्या मिळवता आली नाही.");
}
</script>

</body>
</html>
