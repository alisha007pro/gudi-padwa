<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>गुढीपाडवा शुभेच्छापत्र - जिल्हा परिषद पालघर</title>
<meta property="og:title" content="गुढीपाडवा शुभेच्छापत्र - जिल्हा परिषद पालघर">
<meta property="og:description" content="मी जि. प. शाळेचा विद्यार्थी - गुढीपाडवा पट वाढवा">
<meta property="og:image" content="logo.png">
<link rel="icon" href="logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Noto Sans Devanagari', sans-serif;
    background: linear-gradient(135deg, #fff5e6 0%, #ffe0b2 50%, #ffcc80 100%);
    min-height: 100vh;
    color: #333;
}

/* Header */
.page-header {
    background: linear-gradient(135deg, #b71c1c, #e65100, #ff8f00);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(183, 28, 28, 0.3);
    position: relative;
    overflow: hidden;
}

.page-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 20px,
        rgba(255,255,255,0.03) 20px,
        rgba(255,255,255,0.03) 40px
    );
}

.header-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

.page-header img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.8);
    object-fit: cover;
}

.header-text h1 {
    font-size: 1.4em;
    font-weight: 800;
}

.header-text .subtitle {
    font-size: 1em;
    opacity: 0.9;
}

/* Container */
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}

/* Form Panel */
.form-panel {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 480px;
}

.form-panel h2 {
    color: #e65100;
    margin-bottom: 20px;
    text-align: center;
}

.form-group { margin-bottom: 16px; }

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
}

.form-group input {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid #ffe0b2;
    border-radius: 10px;
}

.btn {
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
}

.btn-generate {
    background: #e65100;
    color: white;
    width: 100%;
}

/* Preview */
.preview-section {
    text-align: center;
}

#greetingCanvas {
    width: 100%;
}

/* Footer */
.footer {
    text-align: center;
    padding: 16px;
}
</style>
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">शुभेच्छापत्र तयार होत आहे...</div>
</div>

<div class="page-header">
    <div class="header-content">
        <img src="logo.png">
        <div class="header-text">
            <h1>जिल्हा परिषद पालघर</h1>
            <div class="subtitle">गुढीपाडवा शुभेच्छापत्र</div>
        </div>
    </div>
</div>

<div class="container">

<div class="form-panel">
    <h2>माहिती भरा</h2>

    <div class="form-group">
        <label>नाव</label>
        <input type="text" id="nameInput">
    </div>

    <div class="form-group">
        <label>पद</label>
        <input type="text" id="roleInput">
    </div>

    <div class="form-group">
        <label>शाळा</label>
        <input type="text" id="schoolInput">
    </div>

    <button class="btn btn-generate" onclick="generateCard()">
        शुभेच्छापत्र तयार करा
    </button>
</div>

<div class="preview-section">
    <canvas id="greetingCanvas" width="1080" height="1920"></canvas>
</div>

</div>

<div class="footer">
    जिल्हा परिषद पालघर &copy; 2026
</div>

<script>
(function() {

var canvas = document.getElementById('greetingCanvas');
var ctx = canvas.getContext('2d');

var logoImg = new Image();
var gudiImg = new Image();

logoImg.src = 'logo.png';
gudiImg.src = 'gudi.png'; //

window.generateCard = function() {

    ctx.fillStyle = "#fff";
    ctx.fillRect(0,0,1080,1920);

    ctx.fillStyle = "#000";
    ctx.font = "40px Arial";

    var name = document.getElementById("nameInput").value;
    var role = document.getElementById("roleInput").value;
    var school = document.getElementById("schoolInput").value;

    ctx.fillText(name,100,400);
    ctx.fillText(role,100,500);
    ctx.fillText(school,100,600);
};

})();
</script>

</body>
</html>
